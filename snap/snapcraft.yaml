name: folderzipper-versioning
base: core24
version: '1.0'
summary: Folder compression with versioning
description: |
  FolderZipperVersioning is a smart backup utility for compressing 
  folders with automatic version control. It features an intuitive 
  GUI, custom version input, auto-increment versioning, and timestamps 
  in filenames.
  
  Features:
  - Easy folder selection via built-in browser
  - Automatic version numbering (001, 002, 003...)
  - Custom version input field (e.g., 1.0.1)
  - Timestamp in zip filenames
  - Dark mode support
  - Directory navigation
  - Real-time status feedback

grade: stable
confinement: strict

apps:
  folderzipper-versioning:
    command: bin/folderzipper-versioning
    plugs:
      - home
      - removable-media
      - desktop
      - desktop-legacy
      - x11
      - wayland

parts:
  folderzipper-versioning:
    plugin: dump
    source: https://github.com/codingismynewgaming/folder-zip-versioning/releases/download/v1.0/FolderZipperVersioning-Linux.tar.gz
    organize:
      FolderZipperVersioning: bin/folderzipper-versioning
    stage-packages:
      - python3
      - python3-tk
      - libx11-6
      
  desktop-file:
    plugin: dump
    source: .
    organize:
      app-files/org.folderzipper.versioning.desktop: share/applications/folderzipper-versioning.desktop
      app-files/app_icon.png: share/icons/hicolor/1024x1024/apps/folderzipper-versioning.png

icons:
  folderzipper-versioning:
    from: app-files/app_icon.png
