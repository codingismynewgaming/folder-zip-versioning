name: Build Linux Packages

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Debian package
        run: |
          mkdir -p debian-pkg/usr/bin
          mkdir -p debian-pkg/usr/share/applications
          mkdir -p debian-pkg/usr/share/icons/hicolor/1024x1024/apps
          mkdir -p debian-pkg/DEBIAN

          cp app-files/zipper.py debian-pkg/usr/bin/folder-zipper-versioning.py
          cp app-files/app_icon.png debian-pkg/usr/share/icons/hicolor/1024x1024/apps/folder-zipper-versioning.png
          cp debian/usr/share/applications/folder-zipper-versioning.desktop debian-pkg/usr/share/applications/

          cat > debian-pkg/usr/bin/folder-zipper-versioning << 'EOF'
          #!/bin/bash
          python3 /usr/bin/folder-zipper-versioning.py "$@"
          EOF
          chmod +x debian-pkg/usr/bin/folder-zipper-versioning

          cat > debian-pkg/DEBIAN/control << 'EOF'
          Package: folder-zipper-versioning
          Version: 1.0
          Section: utils
          Priority: optional
          Architecture: all
          Depends: python3, python3-tk
          Maintainer: codingismynewgaming
          Description: Folder Zipper with automatic versioning
           A Python Tkinter GUI application that zips folders with automatic
           version numbering and custom version support.
          Homepage: https://github.com/codingismynewgaming/folder-zip-versioning
          EOF

          cat > debian-pkg/DEBIAN/postinst << 'EOF'
          #!/bin/bash
          update-desktop-database || true
          EOF
          chmod 755 debian-pkg/DEBIAN/postinst

          mkdir -p builds
          dpkg-deb --build debian-pkg builds/folder-zipper-versioning_1.0_all.deb

      - name: Upload .deb Artifact
        uses: actions/upload-artifact@v4
        with:
          name: folder-zipper-versioning-deb
          path: builds/*.deb

      - name: Upload .deb to release
        if: github.event_name == 'release'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: builds/*.deb
          tag: ${{ github.ref }}
          overwrite: true

  build-rpm:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    steps:
      - name: Install build tools
        run: dnf install -y rpm-build python3-devel python3-setuptools
        
      - uses: actions/checkout@v4

      - name: Build RPM package
        run: |
          mkdir -p ~/rpmbuild/{SOURCES,SPECS,BUILD,RPMS,SRPMS}
          
          # Prepare source files
          mkdir -p folder-zipper-versioning-1.0
          cp -r app-files LICENSE README.md folder-zipper-versioning-1.0/
          tar -czf ~/rpmbuild/SOURCES/folder-zipper-versioning-1.0.tar.gz folder-zipper-versioning-1.0
          
          cp rpm/folder-zipper-versioning.desktop ~/rpmbuild/SOURCES/
          cp rpm/icon.png ~/rpmbuild/SOURCES/
          cp rpm/folder-zipper-versioning.spec ~/rpmbuild/SPECS/

          rpmbuild -ba ~/rpmbuild/SPECS/folder-zipper-versioning.spec
          
          mkdir -p builds
          cp ~/rpmbuild/RPMS/noarch/*.rpm builds/

      - name: Upload .rpm Artifact
        uses: actions/upload-artifact@v4
        with:
          name: folder-zipper-versioning-rpm
          path: builds/*.rpm

      - name: Upload .rpm to release
        if: github.event_name == 'release'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: builds/*.rpm
          tag: ${{ github.ref }}
          overwrite: true

  build-arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install build tools
        run: |
          pacman -Syu --noconfirm base-devel git sudo

      - uses: actions/checkout@v4

      - name: Build Arch package
        run: |
          # Create non-root user for makepkg
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD:ALL" >> /etc/sudoers
          chown -R builder .
          
          # Prepare sources
          cp app-files/app_icon.png arch-linux/icon.png
          mkdir -p folder-zipper-versioning-1.0
          cp -r app-files LICENSE README.md folder-zipper-versioning-1.0/
          tar -czf arch-linux/folder-zipper-versioning-1.0.tar.gz folder-zipper-versioning-1.0
          
          cd arch-linux
          sudo -u builder makepkg --noconfirm -s
          
          cd ..
          mkdir -p builds
          cp arch-linux/*.pkg.tar.zst builds/

      - name: Upload .pkg.tar.zst Artifact
        uses: actions/upload-artifact@v4
        with:
          name: folder-zipper-versioning-arch
          path: builds/*.pkg.tar.zst

      - name: Upload .pkg.tar.zst to release
        if: github.event_name == 'release'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: builds/*.pkg.tar.zst
          tag: ${{ github.ref }}
          overwrite: true
