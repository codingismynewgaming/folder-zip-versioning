name: Build Linux Packages

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Debian package structure
        run: |
          # Create package directories
          mkdir -p debian-pkg/usr/bin
          mkdir -p debian-pkg/usr/share/applications
          mkdir -p debian-pkg/usr/share/icons/hicolor/1024x1024/apps
          mkdir -p debian-pkg/DEBIAN

          # Copy application files
          cp app-files/zipper.py debian-pkg/usr/bin/folder-zipper-versioning.py
          cp app-files/app_icon.png debian-pkg/usr/share/icons/hicolor/1024x1024/apps/folder-zipper-versioning.png
          cp debian/usr/share/applications/folder-zipper-versioning.desktop debian-pkg/usr/share/applications/

          # Create launcher script
          cat > debian-pkg/usr/bin/folder-zipper-versioning << 'EOF'
          #!/bin/bash
          python3 /usr/bin/folder-zipper-versioning.py "$@"
          EOF
          chmod +x debian-pkg/usr/bin/folder-zipper-versioning

          # Create control file
          cat > debian-pkg/DEBIAN/control << 'EOF'
          Package: folder-zipper-versioning
          Version: 1.0
          Section: utils
          Priority: optional
          Architecture: all
          Depends: python3, python3-tk
          Maintainer: codingismynewgaming
          Description: Folder Zipper with automatic versioning
           A Python Tkinter GUI application that zips folders with automatic
           version numbering and custom version support.
          Homepage: https://github.com/codingismynewgaming/folder-zip-versioning
          EOF

          # Create postinst script with correct permissions
          cat > debian-pkg/DEBIAN/postinst << 'EOF'
          #!/bin/bash
          update-desktop-database || true
          EOF
          chmod 755 debian-pkg/DEBIAN/postinst

      - name: Build Debian package
        uses: jtdor/build-deb-action@v1
        with:
          source-dir: debian-pkg
          buildpackage-opts: --build=binary --no-sign
          artifacts-dir: builds

      - name: Upload .deb to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: builds/*.deb
          tag: ${{ github.ref }}
          overwrite: true

  build-rpm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up RPM build environment
        run: |
          mkdir -p rpm-build/{SOURCES,SPECS}
          cp rpm/folder-zipper-versioning.spec rpm-build/SPECS/
          cp rpm/icon.png rpm-build/SOURCES/
          cp rpm/folder-zipper-versioning.desktop rpm-build/SOURCES/
          
          # Create source tarball with prefix directory
          mkdir -p folder-zipper-versioning-1.0
          cp -r app-files LICENSE README.md folder-zipper-versioning-1.0/
          tar -czf rpm-build/SOURCES/folder-zipper-versioning-1.0.tar.gz folder-zipper-versioning-1.0

      - name: Build RPM package
        uses: naveenrajm7/rpmbuild@master
        id: rpm_build
        with:
          spec_file: "rpm-build/SPECS/folder-zipper-versioning.spec"

      - name: Upload .rpm to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ steps.rpm_build.outputs.rpm_dir_path }}/*.rpm
          tag: ${{ github.ref }}
          overwrite: true

  build-arch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Arch source files
        run: |
          cp app-files/app_icon.png arch-linux/icon.png
          mkdir -p folder-zipper-versioning-1.0
          cp -r app-files LICENSE README.md folder-zipper-versioning-1.0/
          tar -czf arch-linux/folder-zipper-versioning-1.0.tar.gz folder-zipper-versioning-1.0

      - name: Build Arch package
        uses: FFY00/build-arch-package@v1
        with:
          PKGBUILD: arch-linux/PKGBUILD
          OUTDIR: builds

      - name: Upload .pkg.tar.zst to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: builds/*.pkg.tar.zst
          tag: ${{ github.ref }}
          overwrite: true
